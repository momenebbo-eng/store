<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }
        .login-card { max-width: 400px; margin: 100px auto; padding: 20px; background: #fff; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="container">
    <div class="login-card">
        <h3 class="text-center mb-4">أهلاً بيك تاني</h3>
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label">البريد الإلكتروني</label>
                <input type="email" id="email" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">كلمة السر</label>
                <input type="password" id="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-success w-100">دخول</button>
        </form>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAlOn_7ErG74KXYhM25LApsZATjXA3PE-M",
        authDomain: "mystore-6fd57.firebaseapp.com",
        projectId: "mystore-6fd57",
        storageBucket: "mystore-6fd57.firebasestorage.app",
        messagingSenderId: "1075846308469",
        appId: "1:1075846308469:web:3d097e4a3064ab33368e3c"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth();

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;

        try {
            await signInWithEmailAndPassword(auth, email, pass);
            alert("نورت المتجر!");
            window.location.href = "index.html";
        } catch (error) {
            alert("الإيميل أو الباسورد غلط!");
        }
    });
</script>
</body>
</html>
