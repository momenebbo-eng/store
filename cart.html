<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>سلة المشتريات | إتمام الطلب</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
    body { font-family: 'Tajawal', sans-serif; background-color: #f4f7f6; padding-bottom: 50px; }
    .navbar { background: rgba(67, 97, 238, 0.95) !important; backdrop-filter: blur(10px); padding: 15px 0; }
    .cart-container { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
    .checkout-form { background: #fff; border-radius: 20px; padding: 25px; border: 1px solid #eee; }
    .btn-rounded { border-radius: 50px; }
    .product-img { width: 50px; height: 50px; object-fit: cover; border-radius: 8px; }
  </style>
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark mb-5" data-aos="fade-down">
    <div class="container">
      <a class="navbar-brand fw-bold fs-3" href="index.html">🛍️ مـتجري</a>
      <a href="products.html" class="btn btn-outline-light btn-rounded btn-sm px-4">العودة للتسوق</a>
    </div>
  </nav>

  <div class="container">
    <div class="row g-4">
      <div class="col-lg-8" data-aos="fade-right">
        <div class="cart-container">
          <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold m-0">سلة المشتريات 🛒</h3>
            <button id="clearCartBtn" class="btn btn-outline-danger btn-sm rounded-pill">مسح السلة</button>
          </div>
          
          <div id="cartItems" class="table-responsive">
            </div>
          
          <hr>
          <div class="d-flex justify-content-between align-items-center mt-3">
            <h4 class="fw-bold">الإجمالي:</h4>
            <h4 class="text-primary fw-bold"><span id="totalPrice">0</span> جنيه</h4>
          </div>
        </div>
      </div>

      <div class="col-lg-4" data-aos="fade-left">
        <div class="checkout-form shadow-sm">
          <h4 class="fw-bold mb-4">بيانات الشحن 🚚</h4>
          <form id="orderForm">
            <div class="mb-3">
              <label class="form-label">الاسم بالكامل</label>
              <input type="text" id="custName" class="form-control" placeholder="أدخل اسمك" required>
            </div>
            <div class="mb-3">
              <label class="form-label">رقم الهاتف</label>
              <input type="tel" id="custPhone" class="form-control" placeholder="01xxxxxxxxx" required>
            </div>
            <div class="mb-3">
              <label class="form-label">العنوان بالتفصيل</label>
              <textarea id="custAddress" class="form-control" rows="3" placeholder="المحافظة، الحي، الشارع..." required></textarea>
            </div>
            <button type="submit" id="submitBtn" class="btn btn-success w-100 py-3 fw-bold rounded-pill shadow-sm">إتمام الطلب ✅</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  
  <script>
    // 1. تفعيل EmailJS
    emailjs.init("IuxryG7bfg4phX9OO");

    document.addEventListener('DOMContentLoaded', () => {
      const cartItemsDiv = document.getElementById('cartItems');
      const totalPriceSpan = document.getElementById('totalPrice');
      const clearBtn = document.getElementById('clearCartBtn');
      const orderForm = document.getElementById('orderForm');

      // دالة تحميل وعرض السلة
      function loadCart() {
        const cart = JSON.parse(localStorage.getItem('cart') || '[]');
        renderCart(cart);
      }

      function renderCart(cart) {
        if (cart.length === 0) {
          cartItemsDiv.innerHTML = '<div class="text-center py-4"><h5>السلة فارغة حالياً 😅</h5></div>';
          totalPriceSpan.textContent = '0.00';
          return;
        }

        let html = `
          <table class="table table-hover align-middle">
            <thead>
              <tr>
                <th>المنتج</th>
                <th>السعر</th>
                <th>إجراء</th>
              </tr>
            </thead>
            <tbody>`;

        let total = 0;
        cart.forEach((item, index) => {
          total += item.price;
          html += `
            <tr>
              <td>
                <div class="d-flex align-items-center">
                   <img src="${item.img || 'https://via.placeholder.com/50'}" class="product-img me-2">
                   <span class="fw-bold">${item.name}</span>
                </div>
              </td>
              <td>${item.price} ج.م</td>
              <td>
                <button class="btn btn-sm btn-danger rounded-circle" onclick="removeItem(${index})">
                  <i class="bi bi-trash"></i>
                </button>
              </td>
            </tr>`;
        });

        html += `</tbody></table>`;
        cartItemsDiv.innerHTML = html;
        totalPriceSpan.textContent = total.toFixed(2);
      }

      // دالة الحذف
      window.removeItem = function(index) {
        let cart = JSON.parse(localStorage.getItem('cart') || '[]');
        cart.splice(index, 1);
        localStorage.setItem('cart', JSON.stringify(cart));
        loadCart();
      };

      // دالة مسح السلة
      clearBtn.onclick = () => {
        if(confirm("هل تريد إفراغ السلة بالكامل؟")) {
          localStorage.removeItem('cart');
          loadCart();
        }
      };

      // 2. إرسال الطلب عبر EmailJS
      orderForm.onsubmit = function(e) {
        e.preventDefault();
        
        const cart = JSON.parse(localStorage.getItem('cart') || '[]');
        if (cart.length === 0) { alert("السلة فارغة!"); return; }

        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.innerText = "جاري الإرسال...";

        // تجهيز قائمة المنتجات نصياً
        let orderDetails = cart.map((item, i) => `${i+1}. ${item.name} (${item.price} ج.م)`).join('\n');

        const templateParams = {
          customer_name: document.getElementById('custName').value,
          customer_phone: document.getElementById('custPhone').value,
          address: document.getElementById('custAddress').value,
          order_details: orderDetails,
          total_price: totalPriceSpan.textContent
        };

        // الإرسال الفعلي
        emailjs.send('service_hyrn654', 'template_p5x4sxy', templateParams)
          .then(function() {
            alert('✅ تم إرسال طلبك بنجاح! سيتم التواصل معك قريباً.');
            localStorage.removeItem('cart'); // مسح السلة بعد النجاح
            window.location.href = "index.html"; 
          }, function(error) {
            alert('❌ فشل الإرسال: ' + JSON.stringify(error));
            submitBtn.disabled = false;
            submitBtn.innerText = "إتمام الطلب ✅";
          });
      };

      loadCart();
      AOS.init({ duration: 800 });
    });
  </script>
</body>
</html>
