<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <title>حساب جديد | متجري</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; font-family: 'Tajawal', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; }
    .card { border-radius: 20px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 400px; padding: 20px; }
  </style>
</head>
<body>

  <div class="card">
    <h3 class="text-center fw-bold text-primary mb-4">إنشاء حساب</h3>
    <form id="regForm">
      <div class="mb-3">
        <label class="form-label fw-bold">الاسم بالكامل</label>
        <input type="text" id="name" class="form-control rounded-pill" placeholder="اكتب اسمك" required>
      </div>
      <div class="mb-3">
        <label class="form-label fw-bold">البريد الإلكتروني</label>
        <input type="email" id="email" class="form-control rounded-pill" placeholder="name@example.com" required>
      </div>
      <div class="mb-3">
        <label class="form-label fw-bold">كلمة السر</label>
        <input type="password" id="pass" class="form-control rounded-pill" required>
      </div>
      <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 shadow fw-bold">سجل دلوقتي</button>
    </form>
    <p class="text-center mt-3 small text-muted">عندك حساب؟ <a href="login.html">دخول</a></p>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAlOn_7ErG74KXYhM25LApsZATjXA3PE-M",
      authDomain: "mystore-6fd57.firebaseapp.com",
      projectId: "mystore-6fd57",
      storageBucket: "mystore-6fd57.firebasestorage.app",
      messagingSenderId: "1075846308469",
      appId: "1:1075846308469:web:3d097e4a3064ab33368e3c"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth();

    document.getElementById('regForm').onsubmit = async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const pass = document.getElementById('pass').value;

      try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
        await updateProfile(userCredential.user, { displayName: name });
        alert("مبروك، الحساب اتعمل!");
        window.location.href = "login.html";
      } catch (err) {
        alert("خطأ: " + err.message);
      }
    };
  </script>
</body>
</html>
