<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>حساب جديد | متجري</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <style>
    body { 
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); 
      font-family: 'Cairo', sans-serif; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      min-height: 100vh; 
      margin: 0;
    }

    .card { 
      border-radius: 25px; 
      border: none; 
      box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
      width: 100%; 
      max-width: 420px; 
      padding: 35px;
      background: rgba(255, 255, 255, 0.95);
      /* تأثير الدخول الناعم */
      animation: fadeInUp 0.8s ease-out;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h3 {
      color: #2d3436;
      margin-bottom: 30px;
    }

    .form-label {
      color: #636e72;
      margin-right: 5px;
    }

    .form-control {
      padding: 12px 20px;
      border: 1px solid #dfe6e9;
      background-color: #f9f9f9;
      transition: all 0.3s ease;
    }

    .form-control:focus {
      background-color: #fff;
      box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.1);
      border-color: #0d6efd;
    }

    .btn-primary {
      background: linear-gradient(to left, #0d6efd, #00d2ff);
      border: none;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(13, 110, 253, 0.3);
      background: linear-gradient(to left, #0b5ed7, #00b8e6);
    }

    .login-link {
      color: #0d6efd;
      text-decoration: none;
      font-weight: 600;
    }

    .login-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="card">
    <h3 class="text-center fw-bold mb-4">إنشاء حساب جديد</h3>
    <form id="regForm">
      <div class="mb-3">
        <label class="form-label fw-bold">الاسم بالكامل</label>
        <input type="text" id="name" class="form-control rounded-pill" placeholder="اكتب اسمك هنا" required>
      </div>
      <div class="mb-3">
        <label class="form-label fw-bold">البريد الإلكتروني</label>
        <input type="email" id="email" class="form-control rounded-pill" placeholder="name@example.com" required>
      </div>
      <div class="mb-4">
        <label class="form-label fw-bold">كلمة السر</label>
        <input type="password" id="pass" class="form-control rounded-pill" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 shadow-sm fw-bold">سجل دلوقتي</button>
    </form>
    <p class="text-center mt-4 mb-0 small text-muted">
      عندك حساب فعلاً؟ <a href="login.html" class="login-link">سجل دخول</a>
    </p>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAlOn_7ErG74KXYhM25LApsZATjXA3PE-M",
      authDomain: "mystore-6fd57.firebaseapp.com",
      projectId: "mystore-6fd57",
      storageBucket: "mystore-6fd57.firebasestorage.app",
      messagingSenderId: "1075846308469",
      appId: "1:1075846308469:web:3d097e4a3064ab33368e3c"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth();

    document.getElementById('regForm').onsubmit = async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const pass = document.getElementById('pass').value;

      try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
        await updateProfile(userCredential.user, { displayName: name });
        alert("مبروك، الحساب اتعمل!");
        window.location.href = "login.html";
      } catch (err) {
        alert("خطأ: " + err.message);
      }
    };
  </script>
</body>
</html>
