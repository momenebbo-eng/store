<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>تفاصيل المنتج - متجري</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
    body { font-family: 'Tajawal', sans-serif; background-color: #f8f9fa; }
    .product-img { border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 100%; height: auto; }
    .breadcrumb-item + .breadcrumb-item::before { content: "\F12C"; font-family: "bootstrap-icons"; flip: horizontal; }
    .badge-category { background-color: #e9ecef; color: #0d6efd; font-weight: bold; padding: 8px 15px; border-radius: 50px; }
  </style>
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html"><i class="bi bi-bag-heart-fill"></i> متجري</a>
      <div class="collapse navbar-collapse" id="navMain">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="index.html">الرئيسية</a></li>
          <li class="nav-item"><a class="nav-link active" href="products.html">المنتجات</a></li>
        </ul>
        <div class="d-flex">
            <a href="cart.html" class="btn btn-light position-relative rounded-pill px-4">
                <i class="bi bi-cart3"></i> السلة
                <span id="cartCount" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
            </a>
        </div>
      </div>
    </div>
  </nav>

  <main class="py-5">
    <div class="container">
      <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
          <li class="breadcrumb-item"><a href="index.html">الرئيسية</a></li>
          <li class="breadcrumb-item"><a href="products.html">المنتجات</a></li>
          <li class="breadcrumb-item active" id="breadcrumbName" aria-current="page">تفاصيل المنتج</li>
        </ol>
      </nav>

      <div class="row g-5">
        <div class="col-md-6 text-center">
          <img id="mainProductImg" src="https://via.placeholder.com/500x500?text=جاري+التحميل" alt="منتج" class="product-img">
        </div>

        <div class="col-md-6">
          <div class="ps-lg-5">
            <span class="badge-category mb-3 d-inline-block" id="productCategory">تصنيف مميز</span>
            <h1 class="display-5 fw-bold mb-3" id="productName">اسم المنتج</h1>
            <h3 class="text-primary fw-bold mb-4" id="productPrice">0.00 $</h3>
            
            <p class="lead text-muted mb-5">
              هذا المنتج يتميز بجودة عالية وتصميم عصري يناسب جميع الأذواق، مع ضمان ضد عيوب الصناعة. اطلبه الآن قبل نفاذ الكمية!
            </p>

            <div class="d-grid gap-3 d-md-flex justify-content-md-start">
              <button id="addToCartBtn" class="btn btn-primary btn-lg px-5 py-3 rounded-pill shadow">
                <i class="bi bi-cart-plus-fill me-2"></i> أضف إلى السلة
              </button>
            </div>

            <hr class="my-5">
            
            <div class="d-flex align-items-center mb-2">
              <i class="bi bi-truck text-primary fs-4 me-3"></i>
              <span>شحن مجاني للطلبات أكثر من 50 دولار</span>
            </div>
            <div class="d-flex align-items-center">
              <i class="bi bi-shield-check text-primary fs-4 me-3"></i>
              <span>ضمان استرجاع خلال 14 يوم</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script>
    // قراءة البيانات من الرابط URL
    const urlParams = new URLSearchParams(window.location.search);
    const pName = urlParams.get('name');
    const pPrice = urlParams.get('price');
    const pImg = urlParams.get('img');

    // وضع البيانات في أماكنها في الصفحة
    if(pName && pPrice && pImg) {
      document.getElementById('productName').innerText = pName;
      document.getElementById('breadcrumbName').innerText = pName;
      document.getElementById('productPrice').innerText = pPrice + ' $';
      document.getElementById('mainProductImg').src = pImg;

      // وظيفة الزر لإضافة المنتج المعروض للسلة
      document.getElementById('addToCartBtn').onclick = function() {
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        cart.push({ name: pName, price: Number(pPrice), img: pImg });
        localStorage.setItem('cart', JSON.stringify(cart));
        updateCartCount();
        alert("✅ تمت إضافة " + pName + " للسلة بنجاح!");
      };
    } else {
      document.querySelector('.row.g-5').innerHTML = '<h3 class="text-center text-danger">عفواً، لم يتم العثور على المنتج.</h3>';
    }

    // تحديث رقم السلة
    function updateCartCount() {
      let cart = JSON.parse(localStorage.getItem('cart')) || [];
      document.getElementById('cartCount').innerText = cart.length;
    }
    window.onload = updateCartCount;
  </script>
</body>
</html>
