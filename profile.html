<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <title>ملفي الشخصي | متجري</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <style>
    body { background-color: #f0f2f5; font-family: 'Tajawal', sans-serif; }
    .profile-card { max-width: 450px; margin: 80px auto; background: white; border-radius: 20px; padding: 40px 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); text-align: center; }
    .profile-icon { font-size: 90px; color: #4361ee; margin-bottom: 10px; }
    .info-box { background: #f8f9fa; border-radius: 15px; padding: 15px; margin-top: 20px; text-align: right; }
  </style>
</head>
<body>

  <div class="container">
    <div class="profile-card">
      <i class="bi bi-person-circle profile-icon"></i>
      <h2 class="fw-bold" id="uName">جاري التحميل...</h2>
      <p class="text-muted" id="uEmail">الرجاء الانتظار</p>
      
      <div class="info-box border">
        <div class="mb-2"><i class="bi bi-shield-check text-success me-2"></i> <strong>حالة الحساب:</strong> <span class="badge bg-success">نشط وموثق</span></div>
        <div><i class="bi bi-star-fill text-warning me-2"></i> <strong>نوع العضوية:</strong> عميل مميز</div>
      </div>

      <div class="d-grid gap-3 mt-4">
        <a href="index.html" class="btn btn-outline-primary rounded-pill py-2">🏠 العودة للمتجر</a>
        <button onclick="logout()" class="btn btn-danger rounded-pill py-2"><i class="bi bi-box-arrow-right"></i> تسجيل الخروج</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    // حط الـ Config بتاعك هنا
    const firebaseConfig = {
      apiKey: "AIzaSyAlOn_7ErG74KXYhM25LApsZATjXA3PE-M",
      authDomain: "mystore-6fd57.firebaseapp.com",
      projectId: "mystore-6fd57",
      storageBucket: "mystore-6fd57.firebasestorage.app",
      messagingSenderId: "1075846308469",
      appId: "1:1075846308469:web:3d097e4a3064ab33368e3c"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth();

    // فحص المستخدم
    onAuthStateChanged(auth, (user) => {
      if (user) {
        document.getElementById('uName').innerText = user.displayName || "مستخدم بدون اسم";
        document.getElementById('uEmail').innerText = user.email;
      } else {
        // لو مش مسجل دخول، اطرده لصفحة الدخول
        window.location.href = 'login.html'; 
      }
    });

    // دالة الخروج
    window.logout = () => {
        signOut(auth).then(() => { window.location.href = 'index.html'; });
    };
  </script>
</body>
</html>
